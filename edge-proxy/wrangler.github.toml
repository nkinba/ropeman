name = "ropeman-github"
main = "src/github.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"
hint = "wnam"

[observability]
enabled = true

[vars]
ALLOWED_ORIGINS = "https://ropeman.dev,http://localhost:5173,http://localhost:5174,http://localhost:4173"

# Secret: GITHUB_PAT — set via `wrangler secret put GITHUB_PAT -c wrangler.github.toml`

[[kv_namespaces]]
binding = "GITHUB_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Create with: wrangler kv namespace create GITHUB_CACHE
